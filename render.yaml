services:
  - type: web
    name: clearance-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py migrate
    startCommand: gunicorn --chdir backend clearance.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: clearance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: clearance-db
    plan: free
