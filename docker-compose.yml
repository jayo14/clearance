version: "3.9"

services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clearance
      POSTGRES_USER: clearance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clearance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://clearance:${DB_PASSWORD:-clearance}@db:5432/clearance
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 clearance.wsgi:application"

  # ── Vite / React frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
